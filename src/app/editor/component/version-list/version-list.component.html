<div class="d-flex flex-column" *ngIf="!!dataSource">
  <mat-card appearance="outlined" class="version-heading flex-fill w-100 h-100">
    <span><strong>FILE VERSIONS</strong></span>
    <div class="version-search">
      <mat-icon
        class="mdi-24px"
        fontIcon="mdi-magnify"
        style="margin-right: 5px"
      ></mat-icon>
      <mat-form-field class="search-input">
        <input
          matInput
          [(ngModel)]="filterString"
          (keyup)="applyFilter($event.target.value)"
          placeholder="Search"
        />
      </mat-form-field>
      <button
        *ngIf="filterString != ''"
        matTooltip="Clear Search"
        mat-icon-button
        (click)="clearFilter()"
        style="outline: none"
      >
        <mat-icon class="mdi-18px" fontIcon="mdi-close-circle"></mat-icon>
      </button>
    </div>
  </mat-card>
  <mat-card
    appearance="outlined"
    *ngFor="let version of dataSource.filteredData"
    [class.selected]="selectedVersionId == version.id"
    class="clickable highlight version-card flex-fill w-100 h-100"
    (click)="selectVersionFn(version)"
  >
    <mat-card-content>
      <div class="d-flex flex-column justify-content-around align-items-start">
        <div>
          <span class="version-name"
            >{{ version.dateSaved | date: 'yyyy-MM-dd HH:mm' }} by
            {{ version.modifiedByName }} as {{ version.name }}</span
          >
        </div>
        <span *ngIf="version.tag" class="version-text"
          ><strong>{{ version.tag }}</strong> tag by
          {{ version.taggedByName }} on
          {{ version.dateTagged | date: 'yyyy-MM-dd HH:mm' }}</span
        >
        <div class="d-flex flex-row w-100 h-100 justify-content-end align-items-center">
          <button
            mat-stroked-button
            (click)="$event.stopPropagation(); revertFile(version)"
          >
            Revert
          </button>
        </div>
      </div>
    </mat-card-content>
  </mat-card>
  <mat-card
    appearance="outlined"
    class="version-card"
    *ngIf="!dataSource.data || dataSource.data.length === 0"
  >
    <mat-card-content>
      <div>
        <span class="version-name">No saved versions ...</span>
      </div>
    </mat-card-content>
  </mat-card>
</div>
