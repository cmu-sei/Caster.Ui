<h2 mat-dialog-title>Export {{ typeString | titlecase }}: {{ name }}</h2>

<form [formGroup]="form" (ngSubmit)="export()">
  <mat-dialog-content>
    @if (isArchiveable) {
    <mat-form-field>
      <mat-label>Archive Type</mat-label>
      <mat-select formControlName="archiveType">
        @for (archiveType of archiveTypes; track archiveType) {
        <mat-option [value]="archiveType">
          {{ archiveType }}
        </mat-option>
        }
      </mat-select>
    </mat-form-field>
    }

    <div class="d-flex flex-row align-items-center gap-2">
      <mat-label>Include Ids</mat-label>
      <mat-slide-toggle
        formControlName="includeIds"
        matTooltip="Append Ids to Directory names to be optionally preserved on import"
      ></mat-slide-toggle>
    </div>
  </mat-dialog-content>

  <mat-dialog-actions align="end">
    <button type="reset" mat-stroked-button (click)="cancel()">Cancel</button>
    <button
      type="submit"
      color="primary"
      mat-flat-button
      [disabled]="!form.valid"
    >
      Export
    </button>
  </mat-dialog-actions>
</form>
