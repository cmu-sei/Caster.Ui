<mat-sidenav-container
  class="appcontent-container"
  [hasBackdrop]="false"
  autosize
>
  <mat-sidenav
    class="appbarmenu-container"
    #sidenav
    mode="side"
    mwlResizable
    [style.min-width.px]="leftSidebarWidth"
    [style.max-width.px]="leftSidebarWidth"
    (resizing)="resizingFn($event)"
    (resizeEnd)="resizeEndFn($event)"
    [opened]="leftSidebarOpen"
    (openedChange)="leftSidebarOpenFn($event)"
  >
    <div class="grid">
      <div class="w-100 h-100 d-flex flex-column justify-content-between align-items-center">
        <div
          class="d-flex flex-row justify-content-start align-items-center gap-3 w-100 h-100"
          style="flex: 1 1 8%"
        >
          <a [routerLink]="['/']">
            <div class="d-flex flex-row justify-content-start align-items-center">
              <mat-icon
                class="caster-icon"
                svgIcon="ic_crucible_caster"
              ></mat-icon>
              <h2 class="icon-text">
                {{ titleText }}
              </h2>
            </div>
          </a>
        </div>

        <mat-divider></mat-divider>
        <div class="scroll-y flex-grow-1 w-100 h-100">
          <cas-project-navigation></cas-project-navigation>
        </div>
        <mat-divider></mat-divider>

        <div class="d-flex flex-row justify-content-start align-items-end w-100 h-100" style="flex: 1 1 8%">
          <img
            class="crucible-logo"
            [src]="
              (theme$ | async) === 'light-theme'
                ? 'assets/img/crucible-logo-light.png'
                : 'assets/img/crucible-logo-dark.png'
            "
          />
        </div>
      </div>
      <div
        class="resize-handle-right"
        mwlResizeHandle
        [resizeEdges]="{ right: true }"
      ></div>
    </div>
  </mat-sidenav>

  <mat-sidenav-content class="d-flex flex-column" *ngIf="project">
    <cas-topbar
      [title]="project.name"
      [topbarColor]="topbarColor"
      [topbarTextColor]="topbarTextColor"
      [topbarView]="TopbarView.CASTER_PROJECT"
      [sidenav]="sidenav"
      [projectId]="project.id"
      (sidenavToggle)="sidenav.toggle()"
      (editMemberships)="openEditMemberships()"
    ></cas-topbar>
    <div class="d-flex flex-row justify-content-center align-items-stretch">
      <div class="w-100 h-100">
        <div
          class="d-flex flex-row justify-content-between align-items-stretch gap-5"
        >
          <cas-project
            style="flex: 1 2 auto"
            [loading]="loading$ | async"
            [project]="project$ | async"
            [projectUI]="projectUI$ | async"
            (closeTab)="closeTab($event)"
            (tabChanged)="tabChangedFn($event)"
          >
          </cas-project>
        </div>
      </div>
    </div>
  </mat-sidenav-content>
</mat-sidenav-container>
