<div class="w-100 h-100" style="overflow: hidden">
  <div class="d-flex flex-row gap-2">
    <div class="flex-fill" style="min-width: 0">
      <cas-project-tab
        [project]="project"
        [projectUI]="projectUI"
        (closeTab)="closeTab.emit($event)"
        (tabChanged)="tabChanged.emit($event)"
      >
      </cas-project-tab>
    </div>
  </div>
</div>
