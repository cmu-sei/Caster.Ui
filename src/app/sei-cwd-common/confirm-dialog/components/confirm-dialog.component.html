<crucible-dialog [title]="title" [hideDefaultActions]="true" (cancel)="onCancel()">
  <p crucibleDialogContent>{{ message }}</p>

  <ng-container crucibleDialogActions>
    @if (buttonFalseText !== '') {
      <button mat-stroked-button type="button" (click)="onCancel()">
        {{ buttonFalseText }}
      </button>
    }
    @if (buttonTrueText !== '') {
      <button
        mat-flat-button
        color="primary"
        type="button"
        cdkFocusInitial
        (click)="onClick(true)"
      >
        {{ buttonTrueText }}
      </button>
    }
  </ng-container>
</crucible-dialog>
