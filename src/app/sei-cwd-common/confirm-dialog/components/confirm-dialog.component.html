<h2 mat-dialog-title>{{ title }}</h2>
<mat-dialog-content>{{ message }}</mat-dialog-content>

<mat-dialog-actions align="end">
  @if (buttonFalseText !== '') {
  <button mat-stroked-button (click)="onCancel()" tabindex="2">
    {{ buttonFalseText }}
  </button>
  } @if (buttonTrueText !== '') {
  <button
    mat-flat-button
    color="primary"
    hotkeyAction="ENTER"
    (click)="onClick(true)"
    tabindex="1"
  >
    {{ buttonTrueText }}
  </button>
  }
</mat-dialog-actions>
