<h2 mat-dialog-title>{{ title }}</h2>

<mat-dialog-content>
  @if (message) {
  <p class="dialog-message">{{ message }}</p>
  }

  <form [formGroup]="form" class="name-form">
    <mat-form-field class="form-full-width">
      <mat-label>Name</mat-label>
      <input
        formControlName="name"
        matInput
        placeholder="Name"
        autocomplete="off"
      />

      @if (name.invalid && (name.dirty || name.touched)) {
      <mat-error>
        @for (validator of validators; track validator) { @if
        (name.hasError(validator.name)) {
        {{ validator.errorMessage }}<br />
        } }
      </mat-error>
      }
    </mat-form-field>

    @if (data.showDescription) {
    <mat-form-field class="form-full-width">
      <mat-label>Description</mat-label>
      <textarea
        formControlName="description"
        matInput
        placeholder="Description"
        autocomplete="off"
        rows="3"
      ></textarea>
    </mat-form-field>
    }
  </form>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-stroked-button (click)="onCancel()" tabindex="2">Cancel</button>
  <button
    mat-flat-button
    color="primary"
    hotkeyAction="ENTER"
    (click)="onClick()"
    [disabled]="!form.valid || !form.dirty"
    tabindex="1"
  >
    Save
  </button>
</mat-dialog-actions>
