<h2 mat-dialog-title>Import Resource</h2>

<form [formGroup]="form" (ngSubmit)="import()">
  <mat-dialog-content>
    <div class="d-flex flex-column">
      <mat-form-field floatLabel="always">
        <mat-label>Address</mat-label>
        <input
          matInput
          formControlName="address"
          matTooltip="Address of the Resource to import"
        />
      </mat-form-field>

      <mat-form-field floatLabel="always">
        <mat-label>Id</mat-label>
        <input
          matInput
          formControlName="id"
          matTooltip="Id of the Resource to import. The format of this field is Resource specific."
        />
      </mat-form-field>

      <div class="output" matTooltip="Results of the import command">
        <cas-output [loading]="false" [output]="message"></cas-output>
      </div>
    </div>
  </mat-dialog-content>

  <mat-dialog-actions align="end">
    <button type="reset" mat-stroked-button (click)="cancel()">Cancel</button>
    <button
      type="submit"
      color="primary"
      mat-flat-button
      [disabled]="!form.valid"
    >
      @if (!loading) {
      <span>Import</span>
      } @else {
      <mat-progress-spinner color="accent" diameter="24" mode="indeterminate">
      </mat-progress-spinner>
      }
    </button>
  </mat-dialog-actions>
</form>
