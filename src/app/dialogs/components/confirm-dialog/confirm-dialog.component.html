<h2 mat-dialog-title>{{ title }}</h2>
<mat-dialog-content>{{ message }}</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-stroked-button (click)="onClick(false)" tabIndex="2">No</button>
  <button mat-flat-button color="primary" (click)="onClick(true)" tabindex="1">
    Yes
  </button>
</mat-dialog-actions>
