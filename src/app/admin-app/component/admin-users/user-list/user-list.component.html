<div class="cssLayoutRowStartCenter">
  <div class="sp-icon">
    <mat-icon class="mdi-24px" fontIcon="mdi-account-multiple"></mat-icon>
  </div>
  <mat-form-field style="width: 300px">
    <input
      matInput
      [(ngModel)]="filterString"
      (keyup)="applyFilter($event.target.value)"
      placeholder="Search"
      />
    @if (!!filterString) {
      <button matSuffix mat-icon-button aria-label="Clear" (click)="clearFilter()">
        <mat-icon class="mdi-24px" fontIcon="mdi-close-circle-outline"></mat-icon>
      </button>
    }
  </mat-form-field>
  <div class="button-end">
    <mat-paginator
      #paginator
      [pageIndex]="0"
      [pageSize]="20"
      [pageSizeOptions]="[5, 10, 15, 20, 25, 50, 100, 200]"
    ></mat-paginator>
  </div>
</div>

<div class="table-container">
@if (addingNewUser) {
  <div class="new-user-row">
    <div class="new-user-cell">
      <mat-form-field>
        <input
          matInput
          placeholder="User ID"
          [(ngModel)]="newUser.id"
          matTooltip="Must be a valid Guid"
          />
      </mat-form-field>
    </div>
    <div class="new-user-cell">
      <mat-form-field>
        <input
          matInput
          placeholder="User Name"
          [(ngModel)]="newUser.name"
          matTooltip="Must have a minimum of 4 characters"
          />
      </mat-form-field>
    </div>
    <div class="new-user-cell">
      <button
        mat-icon-button
        (click)="addNewUser(true)"
        [disabled]="!newUser.id || !newUser.name || newUser.name.length < 4"
        >
        <mat-icon
          class="mdi-24px"
          fontIcon="mdi-account-plus"
          matTooltip="Add this user"
        ></mat-icon>
      </button>
      <button mat-icon-button (click)="addNewUser(false)" matTooltip="Cancel">
        <mat-icon class="mdi-24px" fontIcon="mdi-account-remove"></mat-icon>
      </button>
    </div>
  </div>
}

<table mat-table matSort [dataSource]="dataSource">
  <ng-container matColumnDef="id">
    <th mat-header-cell *matHeaderCellDef mat-sort-header>
      <button mat-icon-button (click)="addingNewUser = true; $event.stopPropagation()" title="Add User" [disabled]="!canEdit">
        <mat-icon class="mdi-24px" fontIcon="mdi-plus-circle"></mat-icon>
      </button>
      ID
    </th>
    <td mat-cell *matCellDef="let item">
      <button
        mat-icon-button
        ngxClipboard
        [cbContent]="item.id"
        (click)="$event.stopPropagation()"
        title="Copy:  {{ item.id }}"
        >
        <mat-icon class="mdi-24px" fontIcon="mdi-content-copy"></mat-icon>
      </button>
      {{ item.id }}
    </td>
  </ng-container>

  <ng-container matColumnDef="name">
    <th mat-header-cell *matHeaderCellDef mat-sort-header>Name</th>
    <td mat-cell *matCellDef="let item">
      {{ item.name }}
    </td>
  </ng-container>

  <ng-container matColumnDef="roleId">
    <th mat-header-cell *matHeaderCellDef mat-sort-header="roleId">Role</th>
    <td mat-cell *matCellDef="let item">
      <mat-form-field subscriptSizing="dynamic">
        <mat-select
          [disabled]="!canEdit"
          [value]="item.roleId == null ? '' : item.roleId"
          (selectionChange)="updateRole(item, $event)"
          >
          <mat-option value="">None Locally</mat-option>
          @for (role of roles$ | async; track trackById($index, role)) {
            <mat-option
              [value]="role.id"
              >{{ role.name }}</mat-option
              >
            }
          </mat-select>
        </mat-form-field>
        @if (canEdit) {
          <button
            mat-icon-button
            (click)="deleteUser(item); $event.stopPropagation()"
            title="Delete User"
            >
            <mat-icon
              class="mdi-24px"
              fontIcon="mdi-trash-can-outline"
            ></mat-icon>
          </button>
        }
    </td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="displayedColumns; sticky: true"></tr>
  <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
</table>

@if (isLoading) {
  <mat-card
    appearance="outlined"
    style="display: flex; justify-content: center; align-items: center"
    >
    <mat-progress-spinner color="primary" mode="indeterminate">
    </mat-progress-spinner>
  </mat-card>
}
</div>
