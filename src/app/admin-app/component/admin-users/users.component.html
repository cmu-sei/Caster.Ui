<div class="component-container mat-elevation-z8">
  <div class="add-margin d-flex flex-row">
    <div class="flex-grow-1">
      @if (!!users$ && !!isLoading$) {
        <cas-user-list
          [users]="users$ | async"
          [isLoading]="isLoading$ | async"
          [canEdit]="canEdit$ | async"
          (create)="create($event)"
          (delete)="deleteUser($event)"
          >
        </cas-user-list>
      }
    </div>
  </div>
</div>
