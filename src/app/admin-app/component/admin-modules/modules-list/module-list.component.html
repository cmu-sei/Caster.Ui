<div class="d-flex flex-row justify-content-start align-items-center">
  <div class="sp-icon">
    <mat-icon class="mdi-24px" fontIcon="mdi-view-module"></mat-icon>
  </div>
  <mat-form-field style="width: 300px">
    <mat-icon matPrefix svgIcon="ic_magnify_search"></mat-icon>
    <input
      matInput
      [(ngModel)]="filterString"
      (keyup)="applyFilter($event.target.value)"
      placeholder="Search"
      />
    @if (!!filterString) {
      <button matSuffix mat-icon-button aria-label="Clear" (click)="clearFilter()">
        <mat-icon class="mdi-24px" fontIcon="mdi-close-circle-outline"></mat-icon>
      </button>
    }
  </mat-form-field>
  <div class="button-end">
    <mat-paginator
      #paginator
      [pageIndex]="0"
      [pageSize]="20"
      [pageSizeOptions]="[5, 10, 15, 20, 25, 50, 100, 200]"
    ></mat-paginator>
  </div>
</div>

@if (canEdit) {
  <div class="add-module-row">
    <span class="add-module-cell">
      <h6 style="float: right; margin-right: 50px">Add/Update Modules >></h6>
    </span>
    <span class="add-module-cell">
      <mat-form-field subscriptSizing="dynamic">
        <input
          matInput
          placeholder="External Module ID"
          [(ngModel)]="externalModuleId"
          matTooltip="Must be a valid ID from the module repository."
          />
      </mat-form-field>
      <button
        mat-icon-button
        (click)="updateModuleFromRepository()"
        [disabled]="!externalModuleId || isLoading"
        >
        <mat-icon
          class="mdi-24px"
          fontIcon="mdi-note-plus"
          matTooltip="Add/Update this module from the repository"
        ></mat-icon>
      </button>
    </span>
    <span class="add-module-cell">
      <button
        mat-icon-button
        (click)="updateAllModules()"
        [disabled]="isLoading"
        >
        <mat-icon
          class="mdi-24px"
          fontIcon="mdi-cloud-download"
          matTooltip="Add/Update ALL from the repository"
        ></mat-icon>
      </button>
    </span>
  </div>
}

<table mat-table matSort [dataSource]="dataSource" class="w-100">
  <ng-container matColumnDef="name">
    <th mat-header-cell *matHeaderCellDef mat-sort-header>Name</th>
    <td mat-cell *matCellDef="let item">
      <div class="d-flex align-items-center">
        <button
          mat-icon-button
          ngxClipboard
          [cbContent]="item.id"
          (click)="$event.stopPropagation()"
          title="Copy:  {{ item.id }}"
          >
          <mat-icon class="mdi-24px" fontIcon="mdi-content-copy"></mat-icon>
        </button>
        {{ item.name }}
      </div>
    </td>
  </ng-container>

  <ng-container matColumnDef="path">
    <th mat-header-cell *matHeaderCellDef mat-sort-header>Path</th>
    <td mat-cell *matCellDef="let item">
      {{ item.path }}
    </td>
  </ng-container>

  <ng-container matColumnDef="versionsCount">
    <th mat-header-cell *matHeaderCellDef mat-sort-header>Versions</th>
    <td mat-cell *matCellDef="let item">
      <span
        [ngClass]="item.versionsCount == 0 ? 'tooltip' : null"
        [matTooltip]="
          item.versionsCount == 0
            ? 'This Module will not be able to be added to a Design until at least 1 Version is created in the git repository.'
            : null
        "
        matTooltipShowDelay="0"
        >{{ item.versionsCount }}</span
        >
    </td>
  </ng-container>

  <ng-container matColumnDef="dateModified">
    <th mat-header-cell *matHeaderCellDef mat-sort-header>Date Loaded</th>
    <td mat-cell *matCellDef="let item">
      <div class="d-flex align-items-center">
        {{ item.dateModified | date: 'yyyy-MM-dd HH:mm' }}
        @if (canEdit) {
          <button
            mat-icon-button
            (click)="deleteModule(item); $event.stopPropagation()"
            title="Delete Module"
            >
            <mat-icon
              class="mdi-24px"
              fontIcon="mdi-trash-can-outline"
            ></mat-icon>
          </button>
        }
      </div>
    </td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="displayedColumns; sticky: true"></tr>
  <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
</table>

@if (isLoading) {
  <mat-card
    appearance="outlined"
    style="display: flex; justify-content: center; align-items: center"
    >
    <mat-progress-spinner color="primary" mode="indeterminate">
    </mat-progress-spinner>
  </mat-card>
}
