<mat-card appearance="outlined">
  <mat-card-title class="flex">
    @if (!editing) {
      <h4 class="header">{{ pool?.name }}</h4>
    }
    @if (editing) {
      <mat-form-field class="header">
        <input
          #nameInput
          matInput
          [value]="pool?.name"
          (keydown.enter)="rename($event.target)"
          (keydown.esc)="editing = false"
          autocomplete="off"
          />
      </mat-form-field>
    }
    @if (pool?.isDefault) {
      <mat-icon
        class="mdi-24px icon"
        fontIcon="mdi-check-circle"
        color="primary"
        matTooltip="Contains The Default Partition"
        >
      </mat-icon>
    }
  </mat-card-title>
  <mat-card-actions class="flex">
    @if (canEdit) {
      @if (!editing) {
        <button
          mat-icon-button
          color="primary"
          matTooltip="Edit Name"
          (click)="editing = !editing"
          >
          <mat-icon class="mdi-24px" fontIcon="mdi-square-edit-outline"> </mat-icon>
        </button>
      }
      @if (editing) {
        <button
          mat-icon-button
          color="primary"
          matTooltip="Rename"
          (click)="rename(nameInput.nativeElement)"
          >
          <mat-icon class="mdi-24px" fontIcon="mdi-check"> </mat-icon>
        </button>
        <button
          mat-icon-button
          color="primary"
          matTooltip="Cancel"
          (click)="editing = false"
          >
          <mat-icon class="mdi-24px" fontIcon="mdi-cancel"> </mat-icon>
        </button>
      }
    }
    <button
      mat-icon-button
      color="primary"
      matTooltip="Open"
      (click)="selectPool(pool)"
      >
      <mat-icon class="mdi-24px" fontIcon="mdi-launch"> </mat-icon>
    </button>
    @if (canEdit) {
      <div class="align-right">
        <button
          mat-icon-button
          color="primary"
          matTooltip="Delete"
          (click)="deletePool(pool)"
          >
          <mat-icon class="mdi-24px" fontIcon="mdi-trash-can-outline"> </mat-icon>
        </button>
      </div>
    }
  </mat-card-actions>
</mat-card>
